services:
  postgis:
    image: postgis/postgis:17-3.5
    container_name: lab-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gispass
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis -d gis"]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: docker.osgeo.org/geoserver:2.28.4
    container_name: lab-geoserver
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      SKIP_DEMO_DATA: "false"
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver_data
      - ./data:/data:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    depends_on:
      - postgis

volumes:
  postgis_data:
  geoserver_data:
